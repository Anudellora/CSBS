# Запуск:  docker compose --env-file backend/.env up --build
#
# Один источник правды для секретов — backend/.env.
# Флаг --env-file подсовывает его и для интерполяции в этом файле,
# и для backend-контейнера (через env_file ниже).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    restart: unless-stopped
    environment:
      # KRaft-режим: один брокер, без zookeeper
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      # Авто-создание топиков, чтобы не возиться вручную
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Внутри docker-сети хост БД — это имя сервиса, не localhost
      DB_HOST: postgres
      # Аналогично — внутри сети брокер доступен по имени сервиса
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build: ./CSBS-FRONTEND
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Cron-расписание бэкапа. @daily = каждый день в 00:00 UTC
      SCHEDULE: "@daily"
      # Политика хранения дампов
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      # Опции pg_dump (gzip-сжатие)
      POSTGRES_EXTRA_OPTS: "-Z6 --schema=public --blobs"
    volumes:
      # Дампы складываются в ./backups/{daily,weekly,monthly} на хосте
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  kafka-data:
